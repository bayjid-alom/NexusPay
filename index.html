<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay | Login</title>
    <link rel="shortcut icon" href="https://picsum.photos/id/201/32/32" type="image/x-icon">
    
    <!-- DaisyUI + TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
        
        .logo-text {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -2px;
        }
    </style>
</head>
<body class="min-h-screen bg-base-100 max-w-md mx-auto">
    
    <div class="pt-16 pb-8">
        <!-- Minimal Logo -->
        <div class="logo mx-auto text-center mb-10">
            <div class="inline-flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-2xl flex items-center justify-center text-white font-bold text-2xl">N</div>
                <h1 class="logo-text text-neutral">NexusPay</h1>
            </div>
        </div>

        <!-- Login Card -->
        <div class="card bg-base-100 w-full max-w-sm mx-auto shadow-xl border border-base-200 rounded-3xl">
            <div class="card-body p-8">
                <h2 class="text-2xl font-semibold text-center mb-8 text-neutral">Login</h2>
                
                <fieldset class="fieldset">
                    <label class="label font-medium text-neutral">Mobile Number</label>
                    <input id="input-number" 
                           maxlength="11" 
                           type="number"
                           class="input input-bordered rounded-full w-full bg-base-200 focus:border-primary"
                           placeholder="01XXXXXXXXX" 
                           value="01648771835" />
                    
                    <label class="label font-medium text-neutral mt-6">4 Digit PIN</label>
                    <input id="input-pin" 
                           maxlength="4" 
                           type="password" 
                           class="input input-bordered rounded-full w-full bg-base-200 focus:border-primary"
                           placeholder="4 Digit Pin" />
                    
                    <button id="login-btn" 
                            class="btn btn-primary mt-8 w-full rounded-full h-12 text-base font-semibold">
                        Login
                    </button>
                </fieldset>
                
                <div class="text-center mt-6">
                    <a href="#" class="link link-primary text-sm">Forgot PIN?</a>
                </div>
            </div>

        </div>
    </div>



    <script src="script/login.js"></script>

</body>
</html>
