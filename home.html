<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay | Home</title>
    <link rel="shortcut icon" href="./assets/fevicon.avif" type="image/x-icon">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- DaisyUI + TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- All themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }

        .logo-text {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -2px;
        }
    </style>
</head>

<body class="w-11/12 bg-base-200 min-h-screen bg-base-100 max-w-md mx-auto">


    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-300 sticky top-0 z-50">
        <div class="px-5 py-4 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-3">
                <div
                    class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-2xl">
                    N</div>
                <div class="">
                    <p class="text-2xl font-semibold text-neutral">$ <span id="balance">25500</span></p>
                    <p class="text-xs text-neutral/60">Available Balance</p>
                </div>
            </div>


            <!-- Logout -->
            <a class="btn btn-soft p-2 btn-m text-neutral hover:text-red-500" href="index.html"><i
                    class="fa-solid fa-arrow-right-from-bracket rotate-180"></i> Logout</a>
        </div>
    </header>









    <div class="p-5 space-y-8">

        <h2 class="text-3xl font-bold py-3">
            Welcome to <span class="text-primary">NexusPay</span>
        </h2>

        <p class="text-neutral/60 mb-10">
            Experience fast, secure, and seamless digital financial services. Add money, cash out, transfer funds, earn
            rewards, and manage your transactions—all in one place.
        </p>
        <!-- Quick Services -->

        <div class="grid grid-cols-3 gap-3">
            <button onclick="showOnly('cashout-section')"
                class="btn h-[70px] flex-col gap-1 bg-[#F8FAFC] text-primary border-[#E2E8F0] transition-all duration-300 hover:bg-primary hover:text-white hover:border-primary hover:-translate-y-1">
                <i class="fa-solid fa-money-bill-wave text-lg"></i>
                <span class="text-xs">Cash Out</span>
            </button>

            <button onclick="showOnly('addmoney-section')"
                class="btn h-[70px] flex-col gap-1 bg-[#F8FAFC] text-primary border-[#E2E8F0] transition-all duration-300 hover:bg-primary hover:text-white hover:border-primary hover:-translate-y-1">
                <i class="fa-solid fa-plus text-lg"></i>
                <span class="text-xs">Add Money</span>
            </button>

            <button onclick="showOnly('transfer-section')"
                class="btn h-[70px] flex-col gap-1 bg-[#F8FAFC] text-primary border-[#E2E8F0] transition-all duration-300 hover:bg-primary hover:text-white hover:border-primary hover:-translate-y-1">
                <i class="fa-solid fa-arrow-right-arrow-left text-lg"></i>
                <span class="text-xs">Transfer Money</span>
            </button>

            <button
                class="btn h-[70px] flex-col gap-1 bg-[#F8FAFC] text-primary border-[#E2E8F0] transition-all duration-300 hover:bg-primary hover:text-white hover:border-primary hover:-translate-y-1">
                <i class="fa-solid fa-file-invoice text-lg"></i>
                <span class="text-xs">Pay Bill</span>
            </button>

            <button
                class="btn h-[70px] flex-col gap-1 bg-[#F8FAFC] text-primary border-[#E2E8F0] transition-all duration-300 hover:bg-primary hover:text-white hover:border-primary hover:-translate-y-1">
                <i class="fa-solid fa-gift text-lg"></i>
                <span class="text-xs">Get Bonus</span>
            </button>

            <button onclick="showOnly('history-container')"
                class="btn h-[70px] flex-col gap-1 bg-[#F8FAFC] text-primary border-[#E2E8F0] transition-all duration-300 hover:bg-primary hover:text-white hover:border-primary hover:-translate-y-1">
                <i class="fa-solid fa-list text-lg"></i>
                <span class="text-xs">Transactions</span>
            </button>
        </div>









        <!-- Cashout Section -->
        <section id="cashout-section" class="hidden">
            <div class="card bg-white shadow border border-base-200 rounded-3xl">
                <div class="card-body">
                    <h3 class="font-semibold text-xl mb-6">Cash Out</h3>

                    <div class="space-y-5">
                        <!-- Agent Number -->
                        <div>
                            <label class="label font-medium">Agent Number</label>
                            <input id="agent-number" type="tel" maxlength="11"
                                class="input input-bordered w-full rounded-full" placeholder="01XXXXXXXXX">
                        </div>

                        <!-- Amount -->
                        <div>
                            <label class="label font-medium">Amount ($)</label>
                            <input id="cashout-amount" type="number" class="input input-bordered w-full rounded-full"
                                placeholder="Enter amount">
                        </div>

                        <!-- PIN -->
                        <div>
                            <label class="label font-medium">4 Digit PIN</label>
                            <input id="cashout-pin" type="password" maxlength="4"
                                class="input input-bordered w-full rounded-full" placeholder="Enter Pin">
                        </div>
                    </div>

                    <button id="cashout-withdraw-btn" "
                        class=" btn btn-primary w-full rounded-full mt-8 text-base font-semibold">
                        Withdraw Now
                    </button>

                    
                </div>
            </div>
    </div>
    </section>





    <!-- Add Money Section -->
    <section id="addmoney-section" class=" mx-auto max-w-md px-4 hidden">
        <div class="card bg-white shadow border border-base-200 rounded-3xl">
            <div class="card-body">
                <h3 class="font-semibold text-xl mb-6">Add Money</h3>

                <div class="space-y-5">
                    <!-- Bank Selection -->
                    <div>
                        <label class="label font-medium">Select Bank</label>
                        <select id="bank-select" class="select select-bordered w-full rounded-full">
                            <option value="">Choose Bank</option>
                            <option value="DBBL">DBBL (Dutch Bangla Bank)</option>
                            <option value="IBBL">IBBL (Islami Bank)</option>
                            <option value="CITY">City Bank</option>
                            <option value="BRAC">BRAC Bank</option>
                            <option value="EBL">EBL Bank</option>
                            <option value="HSBC">HSBC</option>
                        </select>
                    </div>

                    <!-- Bank Account Number -->
                    <div>
                        <label class="label font-medium">Bank Account Number</label>
                        <input maxlength="11" id="account-number" type="text"
                            class="input input-bordered w-full rounded-full" placeholder="Enter account number">
                    </div>

                    <!-- Amount -->
                    <div>
                        <label class="label font-medium">Amount to Add</label>
                        <input id="add-amount" type="number" class="input input-bordered w-full rounded-full"
                            placeholder="Enter amount">
                    </div>

                    <!-- PIN -->
                    <div>
                        <label class="label font-medium">4 Digit PIN</label>
                        <input id="add-pin" type="password" maxlength="4"
                            class="input input-bordered w-full rounded-full" placeholder="Enter Pin">
                    </div>
                </div>

                <!-- Buttons -->
                <button id="addmoney-btn" class="btn btn-primary w-full rounded-full mt-8 text-base font-semibold">
                    Add Money
                </button>


            </div>
        </div>
    </section>









    <!-- Transfer Money Section -->
    <section id="transfer-section" class=" mx-auto max-w-md px-4 hidden">
        <div class="card bg-white max-w-md shadow border border-base-200 rounded-3xl">
            <div class="card-body">
                <h3 class="font-semibold text-xl mb-6">Transfer Money</h3>

                <div class="space-y-5">
                    <!-- User Account Number -->
                    <div>
                        <label class="label font-medium">Recipient Account Number</label>
                        <input id="transfer-account" type="text" maxlength="11"
                            class="input input-bordered w-full rounded-full" placeholder="Account Number">
                    </div>

                    <!-- Amount -->
                    <div>
                        <label class="label font-medium">Amount ($)</label>
                        <input id="transfer-amount" type="number" class="input input-bordered w-full rounded-full"
                            placeholder="Enter amount">
                    </div>

                    <!-- PIN -->
                    <div>
                        <label class="label font-medium">4 Digit PIN</label>
                        <input id="transfer-pin" type="password" maxlength="4"
                            class="input input-bordered w-full rounded-full" placeholder="Enter Pin">
                    </div>
                </div>

                <!-- Buttons -->
                <button id="transfer-send-btn" class="btn btn-primary w-full rounded-full mt-8 text-base font-semibold">
                    Send Now
                </button>

            </div>
        </div>
    </section>







    <!-- Transaction -->
    <section id="history-container" class="w-11/12 mx-auto max-w-md py-3 space-y-5 hidden">
        <div>
            <h3 class="font-semibold text-xl mb-6">Transaction History</h3>
        </div>

        <!-- <div
            class="history-card bg-base-100 text-neutral/80 text-sm leading-6 rounded-md border border-gray-200 p-4 transition-all duration-300 ease-in-out hover:-translate-y-1 hover:shadow-md">
           
        </div> -->


    </section>





    




    <script src="script/machine.js"></script>
    <script src="script/cashout.js"></script>
    <script src="script/addMoney.js"></script>
    <script src="script/transfer.js"></script>
</body>

</html>
